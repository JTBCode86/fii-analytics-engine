services:
  # ============================================================================
  # 0. BUILD ISOLADO DAS LAMBDAS
  # ============================================================================
  lambda-builder:
    image: python:3.10-slim
    container_name: fiianalytics_lambda_builder
    networks:
      - fiianalytics_network
    volumes:
      - .:/app
      - lambda_dist:/tmp/lambda_dist
    entrypoint: >
      bash -c "set -e;
      echo 'Iniciando build...';
      apt-get update && apt-get install -y zip;
      rm -rf /tmp/build1 /tmp/build2;
      mkdir -p /tmp/lambda_dist /tmp/build1 /tmp/build2;
      
      echo 'Instalando dependencias processar_carteira...';
      pip install -r /app/serverless/lambdas/processar_carteira/requirements.txt -t /tmp/build1;
      cp /app/serverless/lambdas/processar_carteira/handler.py /tmp/build1/;
      cd /tmp/build1 && zip -r /tmp/lambda_dist/processar_carteira.zip .;
      
      echo 'Instalando dependencias scraper_ativos...';
      pip install -r /app/serverless/lambdas/scraper_ativos/requirements.txt -t /tmp/build2 --platform manylinux2014_x86_64 --only-binary=:all: --target /tmp/build2;
      cp /app/serverless/lambdas/scraper_ativos/handler.py /tmp/build2/;
      cd /tmp/build2 && zip -r /tmp/lambda_dist/scraper_ativos.zip .;
      echo 'Builds concluídos com sucesso!'"
  
  # ============================================================================
  # 1. INFRAESTRUTURA AWS (LOCALSTACK 3.0)
  # ============================================================================
  localstack:
    container_name: fiianalytics_localstack
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DOCKER_FLAGS=--rm --network=fiianalytics_network
      - LAMBDA_TIMEOUT=60
      - LAMBDA_RUNTIME_ENVIRONMENT_TIMEOUT=120
      - LAMBDA_KEEP_ALIVE=300
      - LAMBDA_EXECUTOR=docker
      - LAMBDA_REMOTE_DOCKER=false
      - LAMBDA_REMOVE_CONTAINERS=true
      - LAMBDA_DOCKER_NETWORK=fiianalytics_network
      - LOCALSTACK_HOST=localhost
      - SCRAPER_QUEUE_URL=http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/scraper-queue
      - SERVICES=lambda,dynamodb,events,sqs,s3
    networks:
      fiianalytics_network:
        aliases:
          - localstack
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack-init:/etc/localstack/init/ready.d"
      - ".:/app"
      - lambda_dist:/tmp/lambda_dist
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localstack:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      lambda-builder:
        condition: service_completed_successfully

  # ============================================================================
  # 2. BACKEND API REST (C# .NET 9)
  # ============================================================================
  fii-api:
    container_name: fiianalytics_api
    build:
      context: .
      dockerfile: src/FiiAnalytics.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AWS__ServiceUrl=http://localstack:4566
      - AWS__Region=us-east-1
      - AWS__AccessKey=test
      - AWS__SecretKey=test
      - AWS_ACCESS_KEY_ID=mock_key
      - AWS_SECRET_ACCESS_KEY=mock_secret
      - TABLE_NAME=FiiAnalyticsDb
      - DYNAMODB_ENDPOINT=http://localstack:4566
      - S3_ENDPOINT=http://localstack:4566
    
    networks:
      - fiianalytics_network
    depends_on:
      localstack:
        condition: service_healthy

# Volumes compartilhados
volumes:
  lambda_dist:

# Rede global consolidada
networks:
  fiianalytics_network:
    name: fiianalytics_network
    driver: bridge
    attachable: true